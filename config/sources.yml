# Vaktin - Gagnalindir / Data Sources
# Öll vefsvæði og gagnalindir sem vaktin fylgist með.
#
# priority: 1 = most important, 3 = nice to have
# type: api | html_scrape | rss
# schedule: how often to check (daily, twice_weekly, weekly)
#
# region: Geographic region for filtering.
#   landsvitt            — Landsvítt (national agencies)
#   hofudborgarsvaedid   — Höfuðborgarsvæðið (capital area)
#   sudurnes             — Suðurnes (Reykjanes peninsula)
#   vestfirdir           — Vestfirðir
#   nordurland           — Norðurland (vestra + eystra)
#   sudurland            — Suðurland

# =============================================================================
# STIG 1: Ríkisstofnanir / National agencies
# =============================================================================

samradsgatt:
  name: "Samráðsgátt ríkisins"
  description: "Government consultation portal - all public consultations on legislation and policy. Uses island.is GraphQL API."
  url: "https://island.is/samradsgatt"
  api_url: "https://island.is/api/graphql"
  type: graphql_api
  priority: 1
  schedule: daily
  region: landsvitt
  topics:
    - umhverfismál
    - náttúruvernd
    - skipulagsmál
    - orkumál
    - sjávarútvegur
    - landbúnaður

skipulagsstofnun:
  name: "Skipulagsstofnun (HMS)"
  description: "Húsnæðis-, mannvirkja- og skipulagsstofnun on island.is — EIA, planning cases. Old Skipulagsstofnun merged into HMS."
  url: "https://island.is"
  sections:
    - name: "Gagnagrunnur umhverfismats"
      path: "/s/hms/gagnagrunnur-umhverfismats"
      description: "Environmental Assessment Database"
    - name: "Umhverfismat framkvæmda"
      path: "/s/hms/umhverfismat-framkvaemda"
      description: "Environmental Impact Assessment for projects"
    - name: "Skipulag"
      path: "/s/hms/skipulag"
      description: "Planning cases"
  type: html_scrape
  priority: 1
  schedule: daily
  region: landsvitt

ust:
  name: "Umhverfisstofnun"
  description: "Environment Agency of Iceland - permits, monitoring, enforcement"
  url: "https://ust.is"
  sections:
    - name: "Afgreiðsla leyfa"
      path: "/nattura/afgreidsla-a-leyfum/"
      description: "Permit processing and decisions"
  type: html_scrape
  priority: 1
  schedule: daily
  region: landsvitt

orkustofnun:
  name: "Umhverfis- og orkustofnun (UOS)"
  description: "Environment and Energy Agency — formerly Orkustofnun (dissolved Dec 2024). Uses Prismic API."
  url: "https://uos.is"
  prismic_repo: "uos-web"
  type: prismic_api
  priority: 1
  schedule: twice_weekly
  region: landsvitt

althingi:
  name: "Alþingi"
  description: "Icelandic Parliament - legislative proposals and bills. Uses XML REST API filtered by nature-relevant subject categories."
  url: "https://www.althingi.is"
  api_url: "https://www.althingi.is/altext/xml"
  type: xml_api
  priority: 1
  schedule: daily
  region: landsvitt
  session: 157
  topics:
    - umhverfismál
    - náttúruvernd
    - orkumál
    - samgöngur
    - sjávarútvegur
    - landbúnaður

vegagerdin:
  name: "Vegagerðin"
  description: "Icelandic Road and Coastal Administration - road/harbor construction projects. RSS feed."
  url: "https://vegagerdin.is"
  rss_url: "https://vegagerdin.is/rss.xml"
  type: rss
  priority: 1
  schedule: daily
  region: landsvitt

natturufraedistofnun:
  name: "Náttúrufræðistofnun Íslands"
  description: "Icelandic Institute of Natural History - species monitoring, red lists, habitat research. RSS feed."
  url: "https://www.natt.is"
  rss_url: "https://www.natt.is/rss.xml"
  type: rss
  priority: 1
  schedule: twice_weekly
  region: landsvitt

mast:
  name: "Matvælastofnun (MAST)"
  description: "Food and Veterinary Authority - aquaculture permits, wildlife cases. RSS feed."
  url: "https://www.mast.is"
  rss_url: "https://www.mast.is/is/feed"
  type: rss
  priority: 2
  schedule: twice_weekly
  region: landsvitt

