# Vaktin - Gagnalindir / Data Sources
# Öll vefsvæði og gagnalindir sem vaktin fylgist með.
#
# priority: 1 = most important, 3 = nice to have
# type: api | html_scrape | rss
# schedule: how often to check (daily, twice_weekly, weekly)

# =============================================================================
# STIG 1: Ríkisstofnanir / National agencies
# =============================================================================

samradsgatt:
  name: "Samráðsgátt ríkisins"
  description: "Government consultation portal - all public consultations on legislation and policy"
  url: "https://samradsgatt.island.is"
  list_url: "https://samradsgatt.island.is/oll-mal"
  type: html_scrape
  priority: 1
  schedule: daily
  topics:
    - umhverfismál
    - náttúruvernd
    - skipulagsmál
    - orkumál
    - sjávarútvegur
    - landbúnaður

skipulagsstofnun:
  name: "Skipulagsstofnun"
  description: "National Planning Agency - environmental impact assessments (EIA) and planning cases"
  url: "https://www.skipulagsstofnun.is"
  sections:
    - name: "Umhverfismat framkvæmda"
      path: "/umhverfismat/framkvaemdamat/"
      description: "Environmental Impact Assessment for projects"
    - name: "Mat á áætlunum"
      path: "/umhverfismat/mat-a-aaetlunum/"
      description: "Strategic Environmental Assessment"
    - name: "Skipulagsmál"
      path: "/skipulagsmal/"
      description: "Planning cases"
  type: html_scrape
  priority: 1
  schedule: daily

ust:
  name: "Umhverfisstofnun"
  description: "Environment Agency of Iceland - permits, monitoring, enforcement"
  url: "https://ust.is"
  sections:
    - name: "Starfsleyfi"
      path: "/einstaklingar/leyfi-og-umsagnir/"
      description: "Operating permits"
    - name: "Fréttir"
      path: "/um-ust/frettir/"
      description: "News from the agency"
  type: html_scrape
  priority: 1
  schedule: daily

orkustofnun:
  name: "Orkustofnun"
  description: "National Energy Authority - energy licenses and research"
  url: "https://orkustofnun.is"
  sections:
    - name: "Fréttir og tilkynningar"
      path: "/frettir/"
      description: "News and announcements"
  type: html_scrape
  priority: 1
  schedule: twice_weekly

